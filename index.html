<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CALL CALL CALL</title>

<!-- ============================================================
     외부 폰트: 한국어 + 영어 모두 iOS 느낌으로 보이도록 가져옴
     - Pretendard (한국어/영어 본문, SF Pro 대체 느낌)
     - Outfit (영문 디스플레이 액센트)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   [전역 변수] 메인 컬러: 흰색 + neon pink(소량) + metalic silver(질감)
   ============================================================ */
:root{
  --white:#ffffff;
  --paper:#f4f5f7;
  --ink:#16161a;
  --ink-soft:#5b5d66;
  --ink-faint:#a3a6b0;
  --neon:#ff2d9b;            /* neon pink - 소량 액센트로만 사용 */
  --neon-soft:#ff7ac2;
  --neon-glow:rgba(255,45,155,.45);
  --silver-1:#fbfbfd;
  --silver-2:#e9eaef;
  --silver-3:#cfd2db;
  --silver-4:#b7bac6;
  --silver-line:rgba(0,0,0,.08);
  --glass:rgba(255,255,255,.62);
  --glass-strong:rgba(255,255,255,.82);
  --shadow-soft:0 8px 30px rgba(20,20,30,.10);
  --shadow-card:0 12px 40px rgba(20,20,30,.14);
  --radius-l:34px;
  --radius-m:24px;
  --radius-s:18px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Pretendard','Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 50% -10%, #ffffff 0%, #eef0f4 45%, #e3e5ec 100%);
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-.01em;
  user-select:none;
}

/* 은은한 금속 질감(노이즈) 오버레이 */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
  mix-blend-mode:multiply;
}

/* 앱 컨테이너: 모바일 폭에 맞추되 기기 외형(베젤)은 만들지 않음 */
#app{
  position:relative;z-index:1;
  max-width:440px;margin:0 auto;
  min-height:100dvh;
  padding:calc(var(--safe-top) + 14px) 20px calc(var(--safe-bot) + 26px);
  display:flex;flex-direction:column;
}

/* ============================================================
   공통 컴포넌트
   ============================================================ */
.screen{display:none;flex-direction:column;flex:1;animation:fadeUp .45s cubic-bezier(.22,1,.36,1);}
.screen.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;font-weight:600;color:var(--ink);padding:2px 6px 14px;
  font-variant-numeric:tabular-nums;
}
.status-bar .dots{display:flex;gap:5px;align-items:center;}
.status-bar .sig{display:flex;gap:2px;align-items:flex-end;height:11px;}
.status-bar .sig i{width:3px;background:var(--ink);border-radius:1px;display:block;}
.status-bar .sig i:nth-child(1){height:4px;}
.status-bar .sig i:nth-child(2){height:6px;}
.status-bar .sig i:nth-child(3){height:8px;}
.status-bar .sig i:nth-child(4){height:11px;}
.status-bar .batt{width:23px;height:11px;border:1.4px solid var(--ink);border-radius:3px;position:relative;}
.status-bar .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--ink);border-radius:0 1px 1px 0;}
.status-bar .batt i{position:absolute;inset:1.4px;width:70%;background:var(--ink);border-radius:1px;}

.metal-card{
  background:linear-gradient(160deg,var(--silver-1),var(--silver-2) 60%,var(--silver-3));
  border:1px solid rgba(255,255,255,.7);
  border-radius:var(--radius-m);
  box-shadow:var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.9);
  position:relative;overflow:hidden;
}
.metal-card::before{ /* 금속 하이라이트 스트라이프 */
  content:"";position:absolute;top:0;left:-40%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);
  transform:skewX(-18deg);
}

/* ============================================================
   [1] 메인 화면 — 로그인(사용자명) 오버레이
   ============================================================ */
#loginOverlay{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  padding:28px;
  background:radial-gradient(120% 90% at 50% 20%, rgba(255,255,255,.86), rgba(228,230,238,.92));
  backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
}
.login-pane{
  width:100%;max-width:360px;text-align:center;
  background:var(--glass-strong);
  border:1px solid rgba(255,255,255,.8);
  border-radius:30px;
  box-shadow:0 24px 70px rgba(20,20,30,.20), inset 0 1px 0 #fff;
  padding:42px 30px 34px;animation:fadeUp .55s cubic-bezier(.22,1,.36,1);
}
.login-avatar{
  width:84px;height:84px;border-radius:50%;margin:0 auto 20px;
  background:linear-gradient(150deg,#fff,var(--silver-2) 55%,var(--silver-3));
  box-shadow:inset 0 2px 4px #fff, 0 8px 22px rgba(20,20,30,.16);
  display:flex;align-items:center;justify-content:center;
}
.login-avatar svg{width:40px;height:40px;stroke:var(--ink-soft);}
.login-title{font-size:22px;font-weight:700;margin:0 0 6px;}
.login-sub{font-size:13.5px;color:var(--ink-soft);margin:0 0 26px;line-height:1.5;}
.field{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.9);
  border:1px solid var(--silver-3);
  border-radius:16px;padding:14px 16px;margin-bottom:18px;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.05);
  transition:border-color .25s, box-shadow .25s;
}
.field:focus-within{border-color:var(--neon);box-shadow:0 0 0 4px var(--neon-glow);}
.field input{
  border:none;outline:none;background:transparent;flex:1;
  font-size:16px;font-family:inherit;color:var(--ink);
}
.field input::placeholder{color:var(--ink-faint);}
.btn-primary{
  width:100%;border:none;cursor:pointer;
  font-family:inherit;font-size:16px;font-weight:600;color:#fff;
  padding:15px;border-radius:16px;
  background:linear-gradient(135deg,var(--neon),#ff5db0);
  box-shadow:0 10px 26px var(--neon-glow);
  transition:transform .18s, box-shadow .18s, opacity .2s;
}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{opacity:.4;box-shadow:none;cursor:not-allowed;}

/* 메인 헤더 */
.greet{padding:4px 6px 20px;}
.greet .hello{font-size:14px;color:var(--ink-soft);font-weight:500;}
.greet h1{
  font-size:32px;margin:2px 0 0;font-weight:700;letter-spacing:-.03em;
}
.greet h1 .name{
  background:linear-gradient(120deg,var(--neon),#ff6cb6);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

/* 캐릭터 전화 위젯 3개 */
.widgets{display:flex;flex-direction:column;gap:16px;}
.call-widget{
  cursor:pointer;border:none;text-align:left;width:100%;
  display:flex;align-items:center;gap:16px;
  padding:20px;border-radius:var(--radius-l);
  background:linear-gradient(155deg,#ffffff, #eef0f5 75%, #e4e6ee);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:var(--shadow-card), inset 0 1px 0 #fff;
  position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
}
.call-widget:active{transform:scale(.975);box-shadow:var(--shadow-soft);}
.call-widget::after{ /* 우상단 은은한 네온 글로우 */
  content:"";position:absolute;top:-40px;right:-30px;width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle,var(--neon-glow),transparent 70%);opacity:.5;
}
.cw-avatar{
  width:60px;height:60px;border-radius:20px;flex:none;position:relative;
  background:linear-gradient(150deg,#fff,var(--silver-2) 60%,var(--silver-3));
  box-shadow:inset 0 1px 2px #fff, 0 6px 16px rgba(20,20,30,.16);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;
  color:var(--ink-soft);
  /* 이미지 추가 위치 안내(아바타) ↓
     [이미지 추가] 캐릭터 프로필 이미지를 넣으려면:
     아래 .cw-avatar 의 배경을 background:url('https://raw.githubusercontent.com/<USER>/<REPO>/main/avatar_A.jpg') center/cover; 로 교체.
     현재는 이니셜 텍스트로 대체 표시함. */
}
.cw-meta{flex:1;min-width:0;}
.cw-name{font-size:18px;font-weight:700;margin:0 0 3px;}
.cw-sub{font-size:13px;color:var(--ink-soft);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cw-call{
  width:46px;height:46px;border-radius:50%;flex:none;
  background:linear-gradient(135deg,#34d75a,#16b943);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(20,180,70,.4);
}
.cw-call svg{width:22px;height:22px;fill:#fff;}

/* ============================================================
   오디오 위젯 (메인 화면 / 테마 반영 음량 조절)
   ============================================================ */
.audio-widget{
  margin-top:auto;margin-bottom:4px;
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;border-radius:var(--radius-m);
  background:var(--glass-strong);
  border:1px solid rgba(255,255,255,.8);
  box-shadow:var(--shadow-soft), inset 0 1px 0 #fff;
  backdrop-filter:blur(14px);
}
.aw-art{
  width:48px;height:48px;border-radius:14px;flex:none;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--neon),#ff7ac2 60%,#c9ccd6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}
.aw-art svg{width:22px;height:22px;fill:#fff;opacity:.95;}
.aw-art.playing::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,var(--neon),#ff7ac2 60%,#c9ccd6);
  animation:pulseArt 2.4s ease-in-out infinite;
}
@keyframes pulseArt{0%,100%{opacity:1;}50%{opacity:.7;}}
.aw-mid{flex:1;min-width:0;}
.aw-title{font-size:14px;font-weight:700;margin:0;display:flex;align-items:center;gap:7px;}
.aw-eq{display:inline-flex;gap:2px;align-items:flex-end;height:12px;}
.aw-eq i{width:3px;background:var(--neon);border-radius:2px;height:4px;}
.aw-eq.on i{animation:eq .9s ease-in-out infinite;}
.aw-eq.on i:nth-child(2){animation-delay:.15s;}
.aw-eq.on i:nth-child(3){animation-delay:.3s;}
.aw-eq.on i:nth-child(4){animation-delay:.45s;}
@keyframes eq{0%,100%{height:4px;}50%{height:12px;}}
.aw-time{font-size:11px;color:var(--ink-faint);margin:3px 0 0;font-variant-numeric:tabular-nums;}
.aw-ctrls{display:flex;align-items:center;gap:10px;}
.aw-play{
  width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;flex:none;
  background:linear-gradient(135deg,#fff,var(--silver-2));
  box-shadow:0 4px 12px rgba(20,20,30,.16), inset 0 1px 0 #fff;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.aw-play:active{transform:scale(.92);}
.aw-play svg{width:18px;height:18px;fill:var(--ink);}
/* 음량 슬라이더 (테마 반영) */
.vol-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding:0 2px;}
.vol-row svg{width:16px;height:16px;fill:var(--ink-soft);flex:none;}
.vol{
  -webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:6px;
  background:linear-gradient(90deg,var(--neon) var(--volp,20%),var(--silver-3) var(--volp,20%));
  outline:none;cursor:pointer;
}
.vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,var(--silver-3));
  box-shadow:0 2px 6px rgba(255,45,155,.5), inset 0 1px 0 #fff;cursor:pointer;
}
.vol::-moz-range-thumb{
  width:18px;height:18px;border:none;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,var(--silver-3));
  box-shadow:0 2px 6px rgba(255,45,155,.5);cursor:pointer;
}
.vol-pct{font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums;width:34px;text-align:right;flex:none;}

/* ============================================================
   [2] 개별 전화 페이지 — 3x3 앱 그리드
   ============================================================ */
.sub-head{display:flex;align-items:center;gap:12px;padding:2px 2px 22px;}
.back-btn{
  width:40px;height:40px;border-radius:14px;border:none;cursor:pointer;flex:none;
  background:var(--glass-strong);border:1px solid rgba(255,255,255,.8);
  box-shadow:var(--shadow-soft), inset 0 1px 0 #fff;
  display:flex;align-items:center;justify-content:center;transition:transform .15s;
}
.back-btn:active{transform:scale(.9);}
.back-btn svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.4;}
.sub-head h2{font-size:24px;font-weight:700;margin:0;}
.sub-head h2 small{display:block;font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-top:2px;}

.app-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px 14px;
  padding:6px 2px;
}
.app-cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
.app-icon{
  width:100%;aspect-ratio:1/1;border-radius:22px;cursor:pointer;border:none;
  position:relative;overflow:hidden;
  box-shadow:0 8px 22px rgba(20,20,30,.16), inset 0 1px 0 rgba(255,255,255,.6);
  transition:transform .18s cubic-bezier(.22,1,.36,1);
}
.app-icon:active{transform:scale(.9);}
.app-icon .glyph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;color:rgba(255,255,255,.95);
  text-shadow:0 1px 4px rgba(0,0,0,.18);
}
/* 그라데이션 변형들(이미지 없이 색으로 구분) */
.g1{background:linear-gradient(150deg,#ff5db0,#ff2d9b);}
.g2{background:linear-gradient(150deg,#c9ccd6,#9aa0b0);}
.g3{background:linear-gradient(150deg,#fff,#dfe2ea 70%,#c4c8d4);}
.g3 .glyph{color:var(--ink-soft);text-shadow:none;}
.g4{background:linear-gradient(150deg,#ff9ed1,#ff5db0 70%,#d05fa0);}
/* 빈 슬롯 */
.app-icon.empty{
  background:repeating-linear-gradient(135deg,rgba(255,255,255,.5),rgba(255,255,255,.5) 8px,rgba(225,227,235,.5) 8px,rgba(225,227,235,.5) 16px);
  box-shadow:inset 0 0 0 1.5px var(--silver-3);cursor:default;
}
.app-icon.empty:active{transform:none;}
.app-label{font-size:12px;font-weight:600;color:var(--ink);text-align:center;line-height:1.25;}
.app-label.empty{color:var(--ink-faint);font-weight:500;}

/* ============================================================
   [3] 전화 진행 페이지
   ============================================================ */
#callScreen{
  position:fixed;inset:0;z-index:60;display:none;flex-direction:column;
  overflow:hidden;
  /* 배경 이미지 위치 ↓ (사용자가 추후 삽입) */
}
#callScreen.active{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* 배경: 3:4 이미지가 화면을 채움 + blur 40% */
.call-bg{
  position:absolute;inset:0;z-index:0;
  /* [이미지 추가] 3:4 규격 배경 이미지:
     background:url('https://raw.githubusercontent.com/<USER>/<REPO>/main/bg_A1.jpg') center/cover;
     아래는 이미지 없을 때의 그라데이션 대체 배경 */
  background:linear-gradient(165deg,#ffd9ee,#ff8fc8 40%,#8a8f9e 100%);
  filter:blur(40px);
  transform:scale(1.15);
}
.call-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.42));}
.call-bg{transition:filter .55s ease, transform .55s ease;}
.call-bg.answered{filter:blur(0px);transform:scale(1.02);}
.call-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;
  padding:calc(var(--safe-top) + 60px) 26px calc(var(--safe-bot) + 44px);
  max-width:440px;margin:0 auto;width:100%;}

/* 수신 대기 단계 */
.ring-stage{flex:1;display:flex;flex-direction:column;align-items:center;}
.ring-label{color:rgba(255,255,255,.78);font-size:14px;letter-spacing:.05em;margin-bottom:8px;
  font-family:'Outfit';font-weight:400;}
.ring-name{color:#fff;font-size:42px;font-weight:700;text-align:center;letter-spacing:-.02em;
  text-shadow:0 2px 20px rgba(0,0,0,.3);margin:0;}
.ring-name .ko{display:block;font-size:18px;font-weight:500;opacity:.85;margin-top:6px;letter-spacing:0;}
.ring-pulse{
  width:120px;height:120px;border-radius:50%;margin:54px 0;position:relative;
  background:linear-gradient(150deg,rgba(255,255,255,.25),rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.4);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
}
.ring-pulse svg{width:52px;height:52px;fill:#fff;}
.ring-pulse::before,.ring-pulse::after{
  content:"";position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,.45);
  animation:ripple 2.2s ease-out infinite;
}
.ring-pulse::after{animation-delay:1.1s;}
@keyframes ripple{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.7);opacity:0;}}

.ring-actions{display:flex;justify-content:space-evenly;align-items:flex-end;margin-top:auto;}
.ring-act{display:flex;flex-direction:column;align-items:center;gap:10px;}
.ring-act span{color:rgba(255,255,255,.9);font-size:13px;font-weight:500;}
.act-btn{
  width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.3);transition:transform .15s;
}
.act-btn:active{transform:scale(.9);}
.act-btn svg{width:30px;height:30px;fill:#fff;}
.act-accept{background:linear-gradient(135deg,#34d75a,#16b943);animation:wob 1.6s ease-in-out infinite;}
.act-decline{background:linear-gradient(135deg,#ff5b5b,#e2342f);}
@keyframes wob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

/* 통화 진행(대사) 단계 */
.talk-stage{display:none;flex-direction:column;flex:1;}
.talk-stage.active{display:flex;}
.talk-top{display:flex;flex-direction:column;align-items:center;gap:4px;}
.talk-name{color:#fff;font-size:24px;font-weight:700;text-shadow:0 2px 16px rgba(0,0,0,.3);}
.talk-timer{color:rgba(255,255,255,.8);font-size:14px;font-variant-numeric:tabular-nums;font-family:'Outfit';}
.dialogue-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  width:100%;padding:30px 0;}
.dialogue-box{
  width:100%;max-width:360px;cursor:pointer;
  background:var(--glass-strong);
  border:1px solid rgba(255,255,255,.7);
  border-radius:26px;padding:26px 24px;
  box-shadow:0 20px 50px rgba(0,0,0,.3), inset 0 1px 0 #fff;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  text-align:left;position:relative;
  animation:boxIn .35s cubic-bezier(.22,1,.36,1);
}

.dialogue-hint .arrow{animation:nudge 1.3s ease-in-out infinite;}
@keyframes nudge{0%,100%{transform:translateX(0);}50%{transform:translateX(4px);}}
.dialogue-progress{display:flex;gap:5px;justify-content:center;margin-top:18px;}
.dialogue-progress i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:.3s;}
.dialogue-progress i.done{background:#fff;}
.dialogue-progress i.cur{background:var(--neon);transform:scale(1.4);}

.talk-bottom{display:flex;justify-content:center;margin-top:auto;}

.popup .p-emoji{font-size:34px;margin-bottom:10px;}

const DEFAULT_DECLINE = [
  { emoji:"😶", title:"전화 거절", msg:"<b>{NAME}</b>(이)가 서운하게 생각했습니다." },
  { emoji:"📵", title:"부재중", msg:"<b>{NAME}</b>의 메시지: “{USER}, 안 받냐?”" },
  { emoji:"💢", title:"전화 거절", msg:"<b>{NAME}</b>(이)가 토라졌습니다." },
  { emoji:"🥺", title:"부재중", msg:"<b>{NAME}</b>의 메시지: “{USER}... 한 번만 받아주지.”" }
];

/* =====================================================================
   ↓↓↓ 이하 동작 로직 (편집 불필요) ↓↓↓
   ===================================================================== */
let USERNAME = "사용자";
let curChar = null, curCall = null, lineIdx = 0;
let talkSec = 0, talkTimerId = null;
let advancing = false; // 빠른 연타로 두 박스 넘어가는 것 방지

const $ = s => document.querySelector(s);
const tpl = str => (str||"").replaceAll("{USER}", USERNAME);

/* ---- 로그인 ---- */
const userInput = $("#usernameInput");
const loginBtn = $("#loginBtn");
userInput.addEventListener("input", ()=>{ loginBtn.disabled = userInput.value.trim().length===0; });
userInput.addEventListener("keydown", e=>{ if(e.key==="Enter" && !loginBtn.disabled) doLogin(); });
loginBtn.addEventListener("click", doLogin);
// 캐릭터 본명 목록 — 입력값이 키와 겹치면 막고 팝업을 띄움
// 형식: "입력될이름": { name:"표시될본명", emoji:"이모지", line:"멘트" }
const CHAR_REAL_NAMES = {
  "경":   { name:"현경",   emoji:"😏", line:"“그거 내 이름이잖아요. 동명이인이라도 됐나.”" },
  "현경": { name:"현경",   emoji:"😏", line:"“{NAME}? 장난치는 것도 아니고.”" },
  "수림": { name:"나수림", emoji:"🙄", line:"“내가 그렇게 좋아? 난 네 이름이 더 좋은데.”" },
  "나수림":{ name:"나수림", emoji:"🙄", line:"“{NAME}은 나야. 네 이름 따로 있잖아.”" },
  "연주": { name:"김연주", emoji:"😤", line:"“성이라도 붙여서 부르지 왜. 선 긋는 거야?”" },
  "김연주":{ name:"김연주", emoji:"😤", line:"“{NAME}? 장난해? 빨리 전화나 받아.”" }
};

function doLogin(){
  const entered = userInput.value.trim() || "사용자";
  const hit = CHAR_REAL_NAMES[entered];
  if(hit){
    // 본명과 겹침 → 막고 다시 입력시킴
    openPopup({
      emoji: hit.emoji,
      title: "잠깐,",
      msg: `<b>${hit.name}</b>: ${hit.line.replaceAll("{NAME}", hit.name)}`,
      btns: [{ label:"다시 입력", cls:"p-fill", act: function(){ closePopup(); userInput.value=""; userInput.focus(); } }]
    });
    return;
  }
  // 정상 → 진입
  USERNAME = entered;
  $("#greetName").textContent = USERNAME;
  $("#loginOverlay").style.display = "none";
  startBgm();
}

/* ---- 화면 전환 ---- */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}
function goMain(){ showScreen("#mainScreen"); }

/* ---- [2] 개별 전화 페이지: 3x3 그리드 ---- */
function openContact(key){
  curChar = key;
  const c = CHARACTERS[key];
  $("#contactTitle").firstChild.textContent = c.name + "\u00A0";
  const grid = $("#appGrid");
  grid.innerHTML = "";
  for(let i=0;i<9;i++){
    const call = c.calls[i];
    const cell = document.createElement("div");
    cell.className = "app-cell";
    if(call){
      cell.innerHTML = `
        <button class="app-icon ${call.grad}" onclick="startCall('${key}',${i})">
          <span class="glyph">${call.icon||"☎"}</span>
        </button>
        <span class="app-label">${call.title||("통화 "+(i+1))}</span>`;
    } else {
      cell.innerHTML = `
        <div class="app-icon empty"></div>
        <span class="app-label empty">빈 슬롯</span>`;
    }
    grid.appendChild(cell);
  }
  showScreen("#contactScreen");
}

/* ---- [3] 전화 진행 ---- */
function startCall(key, idx){
  curChar = key; curCall = idx; lineIdx = 0;
  const c = CHARACTERS[key], call = c.calls[idx];

  // 배경
  const bg = $("#callBg");
  bg.classList.remove("answered"); // ← 이 줄 추가
  if(call.bgImage){
    bg.style.background = `url('${call.bgImage}') center/cover`;
  } else {
    bg.style.background = ""; // CSS 기본 그라데이션 사용
  }

  // 수신 대기 화면 세팅
  $("#ringName").firstChild.textContent = c.nameEn || c.name;
  $("#ringNameKo").textContent = c.name;
  $("#talkName").textContent = c.name;

  $("#ringStage").style.display = "flex";
  $("#talkStage").classList.remove("active");
  $("#callScreen").classList.add("active");
}

function acceptCall(){
  $("#ringStage").style.display = "none";
  $("#talkStage").classList.add("active");
  $("#callBg").classList.add("answered"); // ← 이 줄 추가
  // 타이머
  talkSec = 0; updateTimer();
  talkTimerId = setInterval(()=>{ talkSec++; updateTimer(); }, 1000);
  // 첫 대사
  lineIdx = 0;
  renderLine();
}
function updateTimer(){
  const m = String(Math.floor(talkSec/60)).padStart(2,"0");
  const s = String(talkSec%60).padStart(2,"0");
  $("#talkTimer").textContent = `${m}:${s}`;
}

function renderLine(){
  const call = CHARACTERS[curChar].calls[curCall];
  const lines = call.lines || [];
  $("#dlgSpeaker").textContent = CHARACTERS[curChar].name;
  $("#dlgLine").textContent = tpl(lines[lineIdx] || "…");
  // 진행 점
  const prog = $("#dlgProgress");
  prog.innerHTML = "";
  for(let i=0;i<lines.length;i++){
    const d = document.createElement("i");
    if(i<lineIdx) d.className="done";
    else if(i===lineIdx) d.className="cur";
    prog.appendChild(d);
  }
  // 박스 리트리거 애니메이션
  const box = $("#dialogueBox");
  box.style.animation="none"; void box.offsetWidth; box.style.animation="";
}

/* 빠른 연타 방지: advancing 플래그로 1회만 처리 */
function nextLine(){
  if(advancing) return;
  advancing = true;
  setTimeout(()=>{ advancing=false; }, 350); // 350ms 잠금

  const call = CHARACTERS[curChar].calls[curCall];
  const lines = call.lines || [];
  lineIdx++;
  if(lineIdx >= lines.length){
    endCall(true); // 대사 끝 → 자동 종료
  } else {
    renderLine();
  }
}

function endCall(natural){
  clearInterval(talkTimerId);
  $("#callScreen").classList.remove("active");
  $("#ringStage").style.display="flex";
  $("#talkStage").classList.remove("active");
  if(natural){
    // 자연 종료 팝업(원하면 주석 처리 가능)
    setTimeout(()=>{
      openPopup({
        emoji:"📞", title:"통화 종료",
        msg:`<b>${CHARACTERS[curChar].name}</b>와(과)의 통화가 끝났습니다.`,
        btns:[{label:"확인", cls:"p-fill", act:closePopup}]
      });
    }, 250);
  }
}

/* 거절 — 수신 대기 / 통화 중 모두에서 호출 가능 */
function declineCall(){
  const call = CHARACTERS[curChar].calls[curCall];
  const name = CHARACTERS[curChar].name;
  let msgObj;
  if(call.declineMsg){
    msgObj = { emoji:"📵", title:"전화 거절", msg: call.declineMsg };
  } else {
    msgObj = DEFAULT_DECLINE[Math.floor(Math.random()*DEFAULT_DECLINE.length)];
  }
  clearInterval(talkTimerId);
  $("#callScreen").classList.remove("active");
  $("#ringStage").style.display="flex";
  $("#talkStage").classList.remove("active");

  openPopup({
    emoji: msgObj.emoji,
    title: msgObj.title,
    msg: tpl(msgObj.msg.replaceAll("{NAME}", name)),
    btns:[{label:"확인", cls:"p-fill", act:closePopup}]
  });
}

/* ---- 팝업 ---- */
function openPopup({emoji,title,msg,btns}){
  $("#popEmoji").textContent = emoji;
  $("#popTitle").textContent = title;
  $("#popMsg").innerHTML = msg;
  const wrap = $("#popBtns");
  wrap.innerHTML = "";
  (btns||[{label:"확인",cls:"p-fill",act:closePopup}]).forEach(b=>{
    const el = document.createElement("button");
    el.className = b.cls || "p-fill";
    el.textContent = b.label;
    el.onclick = b.act || closePopup;
    wrap.appendChild(el);
  });
  $("#popupLayer").classList.add("active");
}
function closePopup(){ $("#popupLayer").classList.remove("active"); }

/* ---- 배경음악 ---- */
const bgm = $("#bgm");
const volSlider = $("#volSlider");
const volPct = $("#volPct");
const awPlay = $("#awPlay");
const awPlayIcon = $("#awPlayIcon");
const awEq = $("#awEq");
const awArt = $("#awArt");
const awCur = $("#awCur");
let bgmPlaying = false;

bgm.volume = 0.20; // 기본 음량 20%

function setVol(v){
  bgm.volume = v/100;
  volSlider.value = v;
  volSlider.style.setProperty("--volp", v+"%");
  volPct.textContent = v+"%";
}
volSlider.addEventListener("input", e=> setVol(+e.target.value));

function startBgm(){
  bgm.play().then(()=>{ setPlayUI(true); }).catch(()=>{ setPlayUI(false); });
}
function setPlayUI(on){
  bgmPlaying = on;
  awPlayIcon.innerHTML = on
    ? '<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>'   // pause
    : '<path d="M8 5v14l11-7z"/>';               // play
  awEq.classList.toggle("on", on);
  awArt.classList.toggle("playing", on);
}
awPlay.addEventListener("click", ()=>{
  if(bgm.paused){ bgm.play().then(()=>setPlayUI(true)).catch(()=>{}); }
  else { bgm.pause(); setPlayUI(false); }
});
bgm.addEventListener("timeupdate", ()=>{
  const m = Math.floor(bgm.currentTime/60);
  const s = String(Math.floor(bgm.currentTime%60)).padStart(2,"0");
  awCur.textContent = `${m}:${s}`;
});

/* ---- 상태바 시계 ---- */
function tick(){
  const d = new Date();
  const t = d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  $("#clock1").textContent = t; $("#clock2").textContent = t;
}
tick(); setInterval(tick, 10000);

/* 초기 포커스 */
window.addEventListener("load", ()=> setTimeout(()=>userInput.focus(), 300));
</script>
